name: OnlyOffice DesktopEditors Repack

on:
  workflow_dispatch:

jobs:
  repack:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    container:
      image: debian:buster

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sed -i s@deb.debian@archive.debian@g /etc/apt/sources.list
          apt-get update
          apt-get install -y wget curl jq dpkg-dev patchelf xz-utils coreutils

      - name: Download OnlyOffice
        id: download
        run: |
          REPO="ONLYOFFICE/DesktopEditors"
          LATEST_TAG=$(curl -s https://api.github.com/repos/$REPO/releases/latest | jq -r .tag_name)
          VERSION=${LATEST_TAG#v}
          ARCH="${{ matrix.arch }}"
          
          if [ "$ARCH" = "amd64" ]; then
            FILE_ARCH="amd64"
          else
            FILE_ARCH="arm64"
          fi
          
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/$REPO/releases/latest | jq -r ".assets[] | select(.name | endswith(\"${FILE_ARCH}.deb\")) | .browser_download_url" | head -n 1)
          
          wget -O onlyoffice.deb "$DOWNLOAD_URL"
          
          REAL_VERSION=$(dpkg-deb -f onlyoffice.deb Version | sed 's/:/_/g')
          
          echo "version=$REAL_VERSION" >> $GITHUB_OUTPUT

      - name: Extract and Reorganize
        run: |
          set -e
          PKG_ID="com.onlyoffice.desktopeditors"
          VERSION="${{ steps.download.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          
          dpkg-deb -R onlyoffice.deb origin
          
          mkdir -p deb/DEBIAN
          mkdir -p deb/opt/apps/$PKG_ID/entries/applications
          mkdir -p deb/opt/apps/$PKG_ID/entries/icons/hicolor/256x256/apps
          mkdir -p deb/opt/apps/$PKG_ID/entries/icons/hicolor/128x128/apps
          mkdir -p deb/opt/apps/$PKG_ID/entries/icons/hicolor/64x64/apps
          mkdir -p deb/opt/apps/$PKG_ID/entries/icons/hicolor/32x32/apps
          mkdir -p deb/opt/apps/$PKG_ID/entries/icons/hicolor/24x24/apps
          
          # Find source directory structure
          SOURCE_DIR=""
          if [ -d "origin/opt/onlyoffice/desktopeditors" ]; then
            SOURCE_DIR="origin/opt/onlyoffice/desktopeditors"
          elif [ -d "origin/usr/share/onlyoffice" ]; then
            SOURCE_DIR="origin/usr/share/onlyoffice"
          else
            echo "Looking for source directory..."
            find origin -type d -name "*onlyoffice*" 2>/dev/null || true
            find origin -type d -name "*desktopeditors*" 2>/dev/null || true
            ls -la origin/
            ls -la origin/opt/ 2>/dev/null || true
            exit 1
          fi
          
          echo "Source directory: $SOURCE_DIR"
          
          # Copy application files
          cp -r "$SOURCE_DIR"/* deb/opt/apps/$PKG_ID/files/
          
          # Copy icons from the source package
          ICON_SIZES="256 128 64 32 24"
          for size in $ICON_SIZES; do
            # Try different icon names used by OnlyOffice
            for icon_name in "asc-de-${size}.png" "onlyoffice-${size}.png" "office-${size}.png"; do
              if [ -f "deb/opt/apps/$PKG_ID/files/$icon_name" ]; then
                cp "deb/opt/apps/$PKG_ID/files/$icon_name" "deb/opt/apps/$PKG_ID/entries/icons/hicolor/${size}x${size}/apps/${PKG_ID}.png"
                break
              fi
            done
          done
          
          # Copy from upstream icon directory if available
          if [ -d "origin/usr/share/icons" ]; then
            find origin/usr/share/icons -name "*.png" -type f | while read icon_file; do
              size=$(echo "$icon_file" | grep -oP '\d+x\d+' | head -1)
              if [ -n "$size" ]; then
                cp "$icon_file" "deb/opt/apps/$PKG_ID/entries/icons/hicolor/${size}/apps/${PKG_ID}.png" 2>/dev/null || true
              fi
            done
          fi
          
          # Desktop file - copy from upstream or use our template
          UPSTREAM_DESKTOP=$(find origin -name "*.desktop" -type f 2>/dev/null | head -1)
          if [ -n "$UPSTREAM_DESKTOP" ]; then
            cp "$UPSTREAM_DESKTOP" "deb/opt/apps/$PKG_ID/entries/applications/${PKG_ID}.desktop"
            # Update desktop file paths
            sed -i "s|Exec=.*|Exec=/opt/apps/$PKG_ID/files/DesktopEditors %U|g" "deb/opt/apps/$PKG_ID/entries/applications/${PKG_ID}.desktop"
            sed -i "s|Icon=.*|Icon=${PKG_ID}|g" "deb/opt/apps/$PKG_ID/entries/applications/${PKG_ID}.desktop"
          else
            cp "assets/$PKG_ID/${PKG_ID}.desktop" "deb/opt/apps/$PKG_ID/entries/applications/${PKG_ID}.desktop"
          fi
          
          # Copy asset files
          cp "assets/$PKG_ID/control" deb/DEBIAN/control
          cp "assets/$PKG_ID/info" "deb/opt/apps/$PKG_ID/info"
          
          # Replace version and architecture placeholders
          sed -i "s/VVVV/$VERSION/g;s/AAAA/$ARCH/g" deb/DEBIAN/control
          sed -i "s/VVVV/$VERSION/g;s/AAAA/$ARCH/g" "deb/opt/apps/$PKG_ID/info"
          
          # Fix chrome-sandbox permissions
          if [ -f "deb/opt/apps/$PKG_ID/files/chrome-sandbox" ]; then
            chmod 4755 "deb/opt/apps/$PKG_ID/files/chrome-sandbox"
          fi
          
          # Search and replace hardcoded paths in all text files
          find deb/opt/apps/$PKG_ID/files -type f \( -name "*.json" -o -name "*.conf" -o -name "*.xml" -o -name "*.ini" -o -name "*.cfg" -o -name "*.txt" \) -exec grep -I -l "/opt/onlyoffice" {} + 2>/dev/null | xargs -r sed -i "s|/opt/onlyoffice|/opt/apps/$PKG_ID/files|g" || true
          find deb/opt/apps/$PKG_ID/files -type f \( -name "*.json" -o -name "*.conf" -o -name "*.xml" -o -name "*.ini" -o -name "*.cfg" -o -name "*.txt" \) -exec grep -I -l "onlyoffice-desktopeditors" {} + 2>/dev/null | xargs -r sed -i "s|onlyoffice-desktopeditors|$PKG_ID|g" || true
          
          # Recursively replace old package references
          find deb/opt/apps/$PKG_ID/files -type f -exec grep -I -l "onlyoffice" {} + 2>/dev/null | xargs -r sed -i "s|onlyoffice|$PKG_ID|g" || true
          
          echo "Extraction and reorganization complete."

      - name: Apply Polyfill
        uses: lmangani/polyfill-glibc-action@main
        with:
          target: deb/opt/apps/com.onlyoffice.desktopeditors/files/libcef.so
          glibc: "2.28"

      - name: Build Deb
        run: |
          PKG_ID="com.onlyoffice.desktopeditors"
          VERSION="${{ steps.download.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          
          # Ensure root ownership for all files
          chown -R root:root deb/
          
          # Build with xz compression for smaller size
          dpkg-deb -Zxz --root-owner-group --build deb "${PKG_ID}_${VERSION}_${ARCH}.deb"
          
          # Show size for verification
          ls -lh "${PKG_ID}_${VERSION}_${ARCH}.deb"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: onlyoffice-${{ matrix.arch }}
          path: "com.onlyoffice.desktopeditors_*.deb"

      - name: Upload to bashupload
        id: bashupload
        continue-on-error: true
        run: |
          FILE=$(ls com.onlyoffice.desktopeditors_*.deb | head -1)
          echo "Uploading $FILE to bashupload.app..."
          OUTPUT=$(curl -s bashupload.app -T "$FILE" -H 'X-Expiration-Seconds: 86400')
          LINK=$(echo "$OUTPUT" | grep -o 'http://bashupload.app/[^[:space:]]*' | head -n 1)
          if [ -n "$LINK" ]; then
            echo "link=$LINK" >> $GITHUB_OUTPUT
            echo "### Download $FILE" >> $GITHUB_STEP_SUMMARY
            echo "Link: [$LINK]($LINK)" >> $GITHUB_STEP_SUMMARY
          fi