name: OnlyOffice DesktopEditors Repack

on:
  workflow_dispatch:

jobs:
  repack:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    container: debian:buster

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sed -i s@deb.debian@archive.debian@g /etc/apt/sources.list
          apt-get update
          apt-get install -y wget curl jq dpkg-dev patchelf xz-utils coreutils

      - name: Download OnlyOffice
        id: download
        run: |
          REPO="ONLYOFFICE/DesktopEditors"
          LATEST_TAG=$(curl -s https://api.github.com/repos/$REPO/releases/latest | jq -r .tag_name)
          VERSION=${LATEST_TAG#v}
          ARCH="${{ matrix.arch }}"
          
          if [ "$ARCH" = "amd64" ]; then
            FILE_ARCH="amd64"
          else
            FILE_ARCH="arm64"
          fi
          
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/$REPO/releases/latest | jq -r ".assets[] | select(.name | endswith(\"${FILE_ARCH}.deb\")) | .browser_download_url" | head -n 1)
          
          wget -O onlyoffice.deb "$DOWNLOAD_URL"
          
          # Extract actual version from deb in case tag doesn't match exactly, and sanitize
          REAL_VERSION=$(dpkg-deb -f onlyoffice.deb Version | sed 's/:/_/g')
          
          echo "version=$REAL_VERSION" >> $GITHUB_OUTPUT

      - name: Extract and Reorganize
        run: |
          PKG_ID="com.onlyoffice.desktopeditors"
          VERSION="${{ steps.download.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          
          dpkg-deb -R onlyoffice.deb source
          rm onlyoffice.deb
          
          mkdir -p deb/DEBIAN
          mkdir -p deb/opt/apps/$PKG_ID/files
          mkdir -p deb/opt/apps/$PKG_ID/entries/applications
          mkdir -p deb/opt/apps/$PKG_ID/entries/icons/hicolor/256x256/apps
          mkdir -p deb/opt/apps/$PKG_ID/entries/icons/hicolor/128x128/apps
          mkdir -p deb/opt/apps/$PKG_ID/entries/icons/hicolor/64x64/apps
          mkdir -p deb/opt/apps/$PKG_ID/entries/icons/hicolor/32x32/apps
          mkdir -p deb/opt/apps/$PKG_ID/entries/icons/hicolor/24x24/apps
          
          # Move files
          if [ -d source/opt/onlyoffice/desktopeditors ]; then
            mv source/opt/onlyoffice/desktopeditors/* deb/opt/apps/$PKG_ID/files/
          else
            echo "Source directory /opt/onlyoffice/desktopeditors not found!"
            ls -R source/opt
            exit 1
          fi
          
          # Handle Icons
          ICON_SRC_BASE="source/usr/share/icons/hicolor"
          ICON_DEST_BASE="deb/opt/apps/$PKG_ID/entries/icons/hicolor"
          
          if [ -d "$ICON_SRC_BASE" ]; then
            echo "Found icons in source, reorganizing..."
            # 遍历所有的尺寸目录 (例如 16x16, 24x24, 等)
            for size_dir in $(ls "$ICON_SRC_BASE"); do
              SRC_ICON_PATH="$ICON_SRC_BASE/$size_dir/apps/onlyoffice-desktopeditors.png"
              if [ -f "$SRC_ICON_PATH" ]; then
                DEST_ICON_DIR="$ICON_DEST_BASE/$size_dir/apps"
                mkdir -p "$DEST_ICON_DIR"
                # 复制并更名为新的包名
                cp "$SRC_ICON_PATH" "$DEST_ICON_DIR/$PKG_ID.png"
                echo "Copied icon for size $size_dir"
              fi
            done
          else
            echo "Warning: Source icons not found at $ICON_SRC_BASE"
          fi

          # Desktop file
          DESKTOP_FILE=$(find source/usr/share/applications -name "*.desktop" | head -n 1)
          cp "$DESKTOP_FILE" deb/opt/apps/$PKG_ID/entries/applications/$PKG_ID.desktop
          
          # Update desktop file
          sed -i "s|Exec=.*|Exec=/opt/apps/$PKG_ID/files/DesktopEditors %U|g" deb/opt/apps/$PKG_ID/entries/applications/$PKG_ID.desktop
          sed -i "s|Icon=.*|Icon=$PKG_ID|g" deb/opt/apps/$PKG_ID/entries/applications/$PKG_ID.desktop
          
          # Permissions
          if [ -f deb/opt/apps/$PKG_ID/files/chrome-sandbox ]; then
            chmod 4755 deb/opt/apps/$PKG_ID/files/chrome-sandbox
          fi

          # Search and replace hardcoded paths in text files
          find deb/opt/apps/$PKG_ID/files -type f -exec grep -I -l "/opt/onlyoffice/desktopeditors" {} + | xargs -r sed -i "s|/opt/onlyoffice/desktopeditors|/opt/apps/$PKG_ID/files|g"
          
          # Control file
          cp source/DEBIAN/control deb/DEBIAN/control
          sed -i "s|^Package:.*|Package: $PKG_ID|g" deb/DEBIAN/control

          
          # Info file
          cat > deb/opt/apps/$PKG_ID/info <<EOF
          {
            "appid": "$PKG_ID",
            "name": "OnlyOffice DesktopEditors",
            "version": "$VERSION",
            "arch": ["$ARCH"],
            "permissions": {
              "autostart": false,
              "notification": true,
              "trayicon": true,
              "clipboard": true,
              "account": false,
              "bluetooth": false,
              "camera": false,
              "audio_record": false,
              "installed_apps": false
            }
          }
          EOF

      - name: Apply Polyfill
        uses: lmangani/polyfill-glibc-action@main
        with:
          target: deb/opt/apps/com.onlyoffice.desktopeditors/files/libcef.so
          glibc: "2.28"

      - name: Build Deb
        run: |
          PKG_ID="com.onlyoffice.desktopeditors"
          VERSION="${{ steps.download.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          dpkg-deb -Zxz -z9 -b deb "${PKG_ID}_${VERSION}_${ARCH}.deb"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: onlyoffice-${{ matrix.arch }}
          path: "*.deb"

      - name: Upload to bashupload
        id: bashupload
        continue-on-error: true
        run: |
          FILE=$(ls com.onlyoffice.desktopeditors_*.deb | head -1)
          echo "Uploading $FILE to bashupload.app..."
          OUTPUT=$(curl -s bashupload.app -T "$FILE" -H 'X-Expiration-Seconds: 86400')
          LINK=$(echo "$OUTPUT" | grep -o 'http://bashupload.app/[^[:space:]]*' | head -n 1)
          if [ -n "$LINK" ]; then
            echo "link=$LINK" >> $GITHUB_OUTPUT
            echo "### Download $FILE" >> $GITHUB_STEP_SUMMARY
            echo "Link: [$LINK]($LINK)" >> $GITHUB_STEP_SUMMARY
          fi
