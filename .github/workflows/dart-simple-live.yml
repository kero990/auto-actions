name: Dart Simple Live Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for the release'
        required: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Clone dart_simple_live
        run: git clone https://github.com/xiaoyaocz/dart_simple_live

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: "17"
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          cache: true
        continue-on-error: true
        id: flutter-setup

      - name: Fallback Flutter
        if: steps.flutter-setup.outcome == 'failure'
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Fixes and Build
        run: |
          cd dart_simple_live/simple_live_app
          
          # 1. Android Fix: Create dummy key.properties to prevent "null cannot be cast to String"
          mkdir -p android
          echo "storePassword=password" > android/key.properties
          echo "keyPassword=password" >> android/key.properties
          echo "keyAlias=alias" >> android/key.properties
          echo "storeFile=key.jks" >> android/key.properties
          touch android/key.jks
          
          # 4. Dependency override for all app packages
          # 3. Linux (and others): Correctly append dependency_overrides with proper indentation
          if grep -q "dependency_overrides:" pubspec.yaml; then
            sed -i '/dependency_overrides:/a \  intl: 0.20.2' pubspec.yaml
          else
            printf "\ndependency_overrides:\n  intl: 0.20.2\n" >> pubspec.yaml
          fi
          
          flutter pub get
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk ../../simple_live_app_android.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: simple_live_app_android.apk

  build-android-tv:
    runs-on: ubuntu-latest
    steps:
      - name: Clone dart_simple_live
        run: |
          git clone https://github.com/xiaoyaocz/dart_simple_live
          cd dart_simple_live
          git checkout TV || echo "TV branch not found"

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: "17"
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          cache: true
        continue-on-error: true
        id: flutter-setup

      - name: Fallback Flutter
        if: steps.flutter-setup.outcome == 'failure'
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Fixes and Build
        run: |
          cd dart_simple_live/simple_live_tv_app
          
          # 1. TV Fix: Create dummy key.properties
          mkdir -p android
          echo "storePassword=password" > android/key.properties
          echo "keyPassword=password" >> android/key.properties
          echo "keyAlias=alias" >> android/key.properties
          echo "storeFile=key.jks" >> android/key.properties
          touch android/key.jks
          
          # 4. Dependency override
          if grep -q "dependency_overrides:" pubspec.yaml; then
            sed -i '/dependency_overrides:/a \  intl: 0.20.2' pubspec.yaml
          else
            printf "\ndependency_overrides:\n  intl: 0.20.2\n" >> pubspec.yaml
          fi
          
          flutter pub get
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk ../../simple_live_tv_app_android.apk

      - name: Upload TV APK
        uses: actions/upload-artifact@v4
        with:
          name: android-tv-apk
          path: simple_live_tv_app_android.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Clone dart_simple_live
        run: git clone https://github.com/xiaoyaocz/dart_simple_live

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          cache: true
        continue-on-error: true
        id: flutter-setup

      - name: Fallback Flutter
        if: steps.flutter-setup.outcome == 'failure'
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Fixes and Build
        run: |
          cd dart_simple_live/simple_live_app
          
          # 4. Dependency override
          if grep -q "dependency_overrides:" pubspec.yaml; then
            # macOS sed needs different syntax for appending
            sed -i '' '/dependency_overrides:/a \
  intl: 0.20.2' pubspec.yaml
          else
            printf "\ndependency_overrides:\n  intl: 0.20.2\n" >> pubspec.yaml
          fi
          
          # 2. iOS Fix: Set IPHONEOS_DEPLOYMENT_TARGET to 15.0
          find ios -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' {} +
          find ios -name "Podfile" -exec sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '15.0'/g" {} +

          flutter pub get
          flutter build ios --release --no-codesign
          
          mkdir -p Payload
          cp -r build/ios/iphoneos/*.app Payload/
          zip -r ../../simple_live_app_ios_sideload.ipa Payload

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: simple_live_app_ios_sideload.ipa

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Clone dart_simple_live
        run: git clone https://github.com/xiaoyaocz/dart_simple_live

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev libgtk-3-dev libblkid-dev liblzma-dev libgcrypt20-dev libglu1-mesa pkg-config clang cmake ninja-build

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.3'
          cache: true
        continue-on-error: true
        id: flutter-setup

      - name: Fallback Flutter
        if: steps.flutter-setup.outcome == 'failure'
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Fixes and Build
        run: |
          cd dart_simple_live/simple_live_app
          
          # 3 & 4. Linux Fix: Correctly append dependency_overrides with proper indentation
          if grep -q "dependency_overrides:" pubspec.yaml; then
            sed -i '/dependency_overrides:/a \  intl: 0.20.2' pubspec.yaml
          else
            printf "\ndependency_overrides:\n  intl: 0.20.2\n" >> pubspec.yaml
          fi
          
          flutter pub get
          flutter build linux --release
          tar -czvf ../../simple_live_app_linux_portable.tar.gz -C build/linux/x64/release/bundle .

      - name: Upload Linux tarball
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: simple_live_app_linux_portable.tar.gz

  create-release:
    needs: [build-android, build-android-tv, build-ios, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: Release ${{ github.event.inputs.tag }}
          draft: false
          prerelease: false
          files: |
            simple_live_app_android.apk
            simple_live_tv_app_android.apk
            simple_live_app_ios_sideload.ipa
            simple_live_app_linux_portable.tar.gz
