name: Build dart_simple_live

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for the release'
        required: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Clone dart_simple_live
        run: git clone https://github.com/xiaoyaocz/dart_simple_live
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: "17"
          cache: 'gradle'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.5'
          cache: true
      - name: Build APK
        run: |
          cd dart_simple_live/simple_live_app
          flutter pub get
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk ../../simple_live_app_android.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: simple_live_app_android.apk

  build-android-tv:
    runs-on: ubuntu-latest
    steps:
      - name: Clone dart_simple_live
        run: |
          git clone https://github.com/xiaoyaocz/dart_simple_live
          cd dart_simple_live
          git checkout TV || echo "TV branch not found, using default"
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: "17"
          cache: 'gradle'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.5'
          cache: true
      - name: Build TV APK
        run: |
          cd dart_simple_live/simple_live_tv_app
          flutter pub get
          flutter build apk --release --target-platform android-arm
          mv build/app/outputs/flutter-apk/app-release.apk ../../simple_live_tv_app_android_v7a.apk
      - name: Upload TV APK
        uses: actions/upload-artifact@v4
        with:
          name: android-tv-apk
          path: simple_live_tv_app_android_v7a.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Clone dart_simple_live
        run: git clone https://github.com/xiaoyaocz/dart_simple_live
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.5'
          cache: true
      - name: Build iOS
        run: |
          cd dart_simple_live/simple_live_app
          flutter pub get
          flutter build ios --release --no-codesign
          APP_NAME=$(ls build/ios/iphoneos | grep .app | head -n 1)
          mkdir Payload
          cp -r "build/ios/iphoneos/$APP_NAME" Payload/
          zip -r ../../simple_live_app_ios_sideload.ipa Payload
      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: simple_live_app_ios_sideload.ipa

  build-linux:
    runs-on: ubuntu-latest
    container:
      image: debian:buster
    steps:
      - name: Prepare environment
        run: |
          sed -i 's/deb.debian.org/archive.debian.org/g' /etc/apt/sources.list
          sed -i 's/security.debian.org/archive.debian.org/g' /etc/apt/sources.list
          apt-get update
          apt-get install -y curl git wget unzip xz-utils libglu1-mesa libgtk-3-dev libblkid-dev liblzma-dev libgcrypt20-dev libmpv-dev pkg-config clang cmake ninja-build
      - name: Install Flutter
        run: |
          git clone https://github.com/flutter/flutter.git -b 3.13.5 /opt/flutter
      - name: Build Linux
        run: |
          export PATH="$PATH:/opt/flutter/bin"
          flutter config --no-analytics
          git clone https://github.com/xiaoyaocz/dart_simple_live
          cd dart_simple_live/simple_live_app
          flutter pub get
          flutter build linux --release
          tar -czvf ../../simple_live_app_linux_portable.tar.gz -C build/linux/x64/release/bundle .
      - name: Upload Linux tarball
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: simple_live_app_linux_portable.tar.gz

  create-release:
    needs: [build-android, build-android-tv, build-ios, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: Release ${{ github.event.inputs.tag }}
          draft: false
          prerelease: false
          files: |
            simple_live_app_android.apk
            simple_live_tv_app_android_v7a.apk
            simple_live_app_ios_sideload.ipa
            simple_live_app_linux_portable.tar.gz
