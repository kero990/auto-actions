name: Dart Simple Live Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for the release'
        required: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Clone dart_simple_live
        run: git clone https://github.com/xiaoyaocz/dart_simple_live

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: "17"
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          cache: true

      - name: Fixes and Build
        run: |
          cd dart_simple_live/simple_live_app
          
          # 1. Android Fix: Create dummy key.properties and generate key.jks
          mkdir -p android/app
          echo "storePassword=password" > android/key.properties
          echo "keyPassword=password" >> android/key.properties
          echo "keyAlias=alias" >> android/key.properties
          echo "storeFile=key.jks" >> android/key.properties
          keytool -genkey -v -keystore android/app/key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias alias -storepass password -keypass password -dname "CN=Example, OU=Example, O=Example, L=Example, S=Example, C=US"
          
          # 4. Dependency override for all app packages
          if grep -q "dependency_overrides:" pubspec.yaml; then
            perl -i -pe 's/dependency_overrides:/dependency_overrides:\n  intl: 0.20.2/g' pubspec.yaml
          else
            printf "\ndependency_overrides:\n  intl: 0.20.2\n" >> pubspec.yaml
          fi
          
          flutter pub get
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk ../../simple_live_app_android.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: simple_live_app_android.apk

  build-android-tv:
    runs-on: ubuntu-latest
    steps:
      - name: Clone dart_simple_live
        run: |
          git clone https://github.com/xiaoyaocz/dart_simple_live
          cd dart_simple_live
          git checkout TV || echo "TV branch not found"

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: "17"
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          cache: true

      - name: Fixes and Build
        run: |
          cd dart_simple_live/simple_live_tv_app
          
          # 1. TV Fix: Create dummy key.properties and generate key.jks
          mkdir -p android/app
          echo "storePassword=password" > android/key.properties
          echo "keyPassword=password" >> android/key.properties
          echo "keyAlias=alias" >> android/key.properties
          echo "storeFile=key.jks" >> android/key.properties
          keytool -genkey -v -keystore android/app/key.jks -keyalg RSA -keysize 2048 -validity 10000 -alias alias -storepass password -keypass password -dname "CN=Example, OU=Example, O=Example, L=Example, S=Example, C=US"
          
          # 4. Dependency override
          if grep -q "dependency_overrides:" pubspec.yaml; then
            perl -i -pe 's/dependency_overrides:/dependency_overrides:\n  intl: 0.20.2/g' pubspec.yaml
          else
            printf "\ndependency_overrides:\n  intl: 0.20.2\n" >> pubspec.yaml
          fi
          
          flutter pub get
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk ../../simple_live_tv_app_android.apk

      - name: Upload TV APK
        uses: actions/upload-artifact@v4
        with:
          name: android-tv-apk
          path: simple_live_tv_app_android.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - name: Clone dart_simple_live
        run: git clone https://github.com/xiaoyaocz/dart_simple_live

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          cache: true

      - name: Fixes and Build
        run: |
          cd dart_simple_live/simple_live_app
          
          # Disable SPM to fall back to CocoaPods
          flutter config --no-enable-swift-package-manager
          
          # 4. Dependency override
          if grep -q "dependency_overrides:" pubspec.yaml; then
            perl -i -pe 's/dependency_overrides:/dependency_overrides:\n  intl: 0.20.2/g' pubspec.yaml
          else
            printf "\ndependency_overrides:\n  intl: 0.20.2\n" >> pubspec.yaml
          fi
          
          # 2. iOS Fix: Set IPHONEOS_DEPLOYMENT_TARGET to 15.0
          find ios -name "project.pbxproj" -exec perl -i -pe 's/IPHONEOS_DEPLOYMENT_TARGET\s*=\s*[0-9.]+/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' {} +
          find ios -name "Podfile" -exec perl -i -pe "s/^#?\s*platform :ios, .*/platform :ios, '15.0'/g" {} +
          # Inject aggressive post_install hooks
          find ios -name "Podfile" -exec perl -i -pe 's/post_install do \|installer\|/post_install do |installer|\n    installer.pods_project.build_configurations.each do |config|\n      config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "15.0"\n    end/g' {} +
          find ios -name "Podfile" -exec perl -i -pe 's/flutter_additional_ios_build_settings\(target\)/flutter_additional_ios_build_settings(target)\n    target.build_configurations.each do |config|\n      config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "15.0"\n    end/g' {} +

          flutter pub get
          flutter build ios --release --no-codesign
          
          mkdir -p Payload
          cp -r build/ios/iphoneos/*.app Payload/
          zip -r ../../simple_live_app_ios_sideload.ipa Payload

      - name: Upload iOS IPA
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: simple_live_app_ios_sideload.ipa

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Clone dart_simple_live
        run: git clone https://github.com/xiaoyaocz/dart_simple_live

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmpv-dev libgtk-3-dev libblkid-dev liblzma-dev libgcrypt20-dev libglu1-mesa pkg-config clang cmake ninja-build

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'master'
          cache: true

      - name: Fixes and Build
        run: |
          cd dart_simple_live/simple_live_app
          
          # 4. Dependency override
          if grep -q "dependency_overrides:" pubspec.yaml; then
            perl -i -pe 's/dependency_overrides:/dependency_overrides:\n  intl: 0.20.2/g' pubspec.yaml
          else
            printf "\ndependency_overrides:\n  intl: 0.20.2\n" >> pubspec.yaml
          fi
          
          flutter pub get
          flutter build linux --release
          tar -czvf ../../simple_live_app_linux_portable.tar.gz -C build/linux/x64/release/bundle .

      - name: Upload Linux tarball
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: simple_live_app_linux_portable.tar.gz

  create-release:
    needs: [build-android, build-android-tv, build-ios, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: Release ${{ github.event.inputs.tag }}
          draft: false
          prerelease: false
          files: |
            simple_live_app_android.apk
            simple_live_tv_app_android.apk
            simple_live_app_ios_sideload.ipa
            simple_live_app_linux_portable.tar.gz
