name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for the release'
        required: true
        default: 'v1.0.0'

jobs:
  android-mobile:
    name: Build Android Mobile
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        run: |
          git clone https://github.com/xiaoyaocz/dart_simple_live.git .
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.5'
          cache: true
      - name: Download Android keystore
        id: android_keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: keystore.jks
          encodedString: ${{ secrets.KEYSTORE_BASE64 }}
      - name: Create key.properties
        run: |
          echo "storeFile=${{ steps.android_keystore.outputs.filePath }}" > simple_live_app/android/key.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> simple_live_app/android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> simple_live_app/android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> simple_live_app/android/key.properties
      - name: Build APK
        run: |
          cd simple_live_app
          flutter pub get
          flutter build apk --release
      - name: Rename APK
        run: |
          mv simple_live_app/build/app/outputs/flutter-apk/app-release.apk simple_live_app_${{ github.event.inputs.tag }}_android.apk
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-mobile-apk
          path: simple_live_app_${{ github.event.inputs.tag }}_android.apk

  android-tv:
    name: Build Android TV
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository
        run: |
          git clone https://github.com/xiaoyaocz/dart_simple_live.git .
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.5'
          cache: true
      - name: Download Android keystore
        id: android_keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: keystore.jks
          encodedString: ${{ secrets.KEYSTORE_BASE64 }}
      - name: Create key.properties
        run: |
          echo "storeFile=${{ steps.android_keystore.outputs.filePath }}" > simple_live_tv_app/android/key.properties
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" >> simple_live_tv_app/android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> simple_live_tv_app/android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> simple_live_tv_app/android/key.properties
      - name: Build APK
        run: |
          cd simple_live_tv_app
          flutter pub get
          flutter build apk --release --target-platform android-arm
      - name: Rename APK
        run: |
          mv simple_live_tv_app/build/app/outputs/flutter-apk/app-release.apk simple_live_tv_app_${{ github.event.inputs.tag }}_android_tv_armhf.apk
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-tv-apk
          path: simple_live_tv_app_${{ github.event.inputs.tag }}_android_tv_armhf.apk

  ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - name: Clone Repository
        run: |
          git clone https://github.com/xiaoyaocz/dart_simple_live.git .
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.5'
          cache: true
      - name: Build iOS
        run: |
          cd simple_live_app
          flutter pub get
          flutter build ios --release --no-codesign
      - name: Package IPA
        run: |
          cd simple_live_app
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ../simple_live_app_${{ github.event.inputs.tag }}_ios_sideload.ipa Payload
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: simple_live_app_${{ github.event.inputs.tag }}_ios_sideload.ipa

  linux:
    name: Build Linux
    runs-on: ubuntu-latest
    container:
      image: debian:10
    steps:
      - name: Install dependencies
        run: |
          echo 'Acquire::Check-Valid-Until "false";' > /etc/apt/apt.conf.d/99no-check-valid-until
          echo "deb http://archive.debian.org/debian buster main" > /etc/apt/sources.list
          echo "deb http://archive.debian.org/debian-security buster/updates main" >> /etc/apt/sources.list
          apt-get update
          apt-get install -y curl git xz-utils zip unzip libglu1-mesa clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libmpv-dev
      - name: Clone Repository
        run: |
          git clone https://github.com/xiaoyaocz/dart_simple_live.git .
      - name: Setup Flutter
        run: |
          curl -LO https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.13.5-stable.tar.xz
          tar xf flutter_linux_3.13.5-stable.tar.xz
          echo "$GITHUB_WORKSPACE/flutter/bin" >> $GITHUB_PATH
      - name: Build Linux
        run: |
          export PATH="$PATH:$GITHUB_WORKSPACE/flutter/bin"
          cd simple_live_app
          flutter config --no-analytics
          flutter config --enable-linux-desktop
          flutter pub get
          flutter build linux --release
      - name: Package Linux
        run: |
          cd simple_live_app/build/linux/x64/release
          tar -czvf $GITHUB_WORKSPACE/simple_live_app_${{ github.event.inputs.tag }}_linux_x64_portable.tar.gz bundle
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: simple_live_app_${{ github.event.inputs.tag }}_linux_x64_portable.tar.gz

  release:
    name: Create Release
    needs: [android-mobile, android-tv, ios, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: Release ${{ github.event.inputs.tag }}
          draft: false
          prerelease: false
          files: |
            android-mobile-apk/*.apk
            android-tv-apk/*.apk
            ios-ipa/*.ipa
            linux-tar/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
