name: Firefox UOS Repack

on:
  workflow_dispatch:
  push:
    paths:
      - 'assets/org.mozilla.firefox-nal/**'
      - '.github/workflows/firefox.yml'

jobs:
  repack:
    runs-on: ubuntu-latest
    container:
      image: debian:buster

    strategy:
      matrix:
        arch: [amd64, arm64]

    env:
      PKG_NAME: "org.mozilla.firefox-nal"

    steps:
      - uses: actions/checkout@v3

      - name: Prepare tools
        run: |
          sed -i s@deb.debian@archive.debian@g /etc/apt/sources.list
          apt-get update
          apt-get install -y wget curl dpkg-dev bzip2 ca-certificates

      - name: Download and Extract Firefox
        id: download
        run: |
          # 映射架构参数
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            OS_TYPE="linux64"
          else
            OS_TYPE="linux-aarch64"
          fi

          # 获取最新版本号
          DOWNLOAD_URL="https://download.mozilla.org/?product=firefox-latest-ssl&os=$OS_TYPE&lang=zh-CN"
          REAL_URL=$(curl -Ls -o /dev/null -w %{url_effective} "$DOWNLOAD_URL")
          VERSION=$(echo "$REAL_URL" | grep -oP 'releases/\K[0-9.]+(?=/)' )
          
          echo "Version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # 下载并解压
          wget -O firefox.tar.bz2 "$DOWNLOAD_URL"
          mkdir -p firefox-raw
          tar -jxvf firefox.tar.bz2 -C firefox-raw --strip-components=1

      - name: Repack as UOS spec
        id: repack
        run: |
          set -e
          VERSION="${{ steps.download.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          
          # 定义 UOS 目录结构
          APP_DIR="deb/opt/apps/$PKG_NAME"
          mkdir -p "$APP_DIR/files"
          mkdir -p "$APP_DIR/entries/applications"
          mkdir -p "$APP_DIR/entries/icons/hicolor/256x256/apps"
          mkdir -p "deb/DEBIAN"

          # 1. 移动 Firefox 二进制文件
          mv firefox-raw/* "$APP_DIR/files/"

          # 2. 复制本地 assets 资源
          cp assets/$PKG_NAME/control deb/DEBIAN/control
          cp assets/$PKG_NAME/info "$APP_DIR/info"
          cp assets/$PKG_NAME/firefox.desktop "$APP_DIR/entries/applications/$PKG_NAME.desktop"
          cp assets/$PKG_NAME/$PKG_NAME.png "$APP_DIR/entries/icons/hicolor/256x256/apps/$PKG_NAME.png"

          # 3. 动态替换版本号和架构
          # 替换 control 和 info 文件中的 VVVV 和 AAAA 占位符
          sed -i "s/VVVV/$VERSION/g;s/AAAA/$ARCH/g" deb/DEBIAN/control
          sed -i "s/VVVV/$VERSION/g;s/AAAA/$ARCH/g" "$APP_DIR/info"

          # 4. 设置权限
          # 确保主程序有执行权限
          chmod +x "$APP_DIR/files/firefox"
          # 确保所有目录权限正确
          find deb -type d -exec chmod 755 {} \;

          # 5. 构建 deb 包
          FILENAME="${PKG_NAME}_${VERSION}_${ARCH}.deb"
          dpkg-deb --build deb "$FILENAME"
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firefox-${{ matrix.arch }}
          path: "${{ steps.repack.outputs.filename }}"

      - name: Upload to bashupload
        id: bashupload
        continue-on-error: true
        run: |
          FILE="${{ steps.repack.outputs.filename }}"
          echo "Uploading $FILE to bashupload.app..."
          OUTPUT=$(curl -s bashupload.app -T "$FILE" -H 'X-Expiration-Seconds: 86400')
          LINK=$(echo "$OUTPUT" | grep -o 'http://bashupload.app/[^[:space:]]*' | head -n 1)
          if [ -n "$LINK" ]; then
             echo "link=$LINK" >> $GITHUB_OUTPUT
             echo "### Download $FILE" >> $GITHUB_STEP_SUMMARY
             echo "Link: [$LINK]($LINK)" >> $GITHUB_STEP_SUMMARY
          fi
